<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lexicon Quest — mockup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    /* SQ-UI light mode (wordy palette) */
    --bg: #faf5ff;
    --panel: #ffffff;
    --panel2: #faf5ff;
    --ink: #3b0764;
    --ink-dim: #8a73b8;
    --accent: #9333ea;
    --accent-2: #7e22ce;
    --accent-deep: #581c87;
    --success: #16a34a;
    --danger: #e11d48;
    --border: #e9d5ff;
    --hp-track: #f3e8ff;
    --tile-a: hsl(270, 80%, 93%);
    --tile-b: hsl(270, 70%, 87%);
    --tile-border: #c084fc;
    --tile-ink: #3b0764;
    --sel: #f472b6;
    --display: "Fredoka One", system-ui, sans-serif;
    --body: "Nunito", system-ui, sans-serif;
  }
  body.dark {
    --bg: #0f0a1e;
    --panel: #1a1130;
    --panel2: #241640;
    --ink: #ede0ff;
    --ink-dim: #c4b5fd;
    --accent: #a855f7;
    --accent-2: #7e22ce;
    --accent-deep: #2d1b55;
    --success: #4ade80;
    --danger: #f87171;
    --border: #2d1b55;
    --hp-track: #241640;
    --tile-a: hsl(270, 70%, 78%);
    --tile-b: hsl(270, 60%, 68%);
    --tile-border: #7c3aed;
    --tile-ink: #1a1130;
    --sel: #f472b6;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font-family: var(--body); line-height: 1.5;
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    padding: 18px 14px 60px;
  }
  .wrap { width: 100%; max-width: 560px; }
  .topbar { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
  .title { font-family: var(--display); font-size: 26px; color: var(--accent); margin: 0; }
  .title small { color: var(--ink-dim); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; display: block; font-family: var(--body); font-weight: 700; }
  .themebtn {
    background: var(--panel2); color: var(--ink-dim); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 10px; font-family: var(--body); font-weight: 700; font-size: 11px; cursor: pointer;
  }
  .themebtn:hover { color: var(--ink); }

  .runbar { display: flex; gap: 8px; margin-bottom: 14px; }
  .room-pip {
    flex: 1; text-align: center; padding: 6px 0; border: 1px solid var(--border);
    border-radius: 7px; font-size: 12px; font-weight: 800; color: var(--ink-dim); background: var(--panel);
  }
  .room-pip.done { color: #fff; border-color: var(--success); background: var(--success); }
  .room-pip.current { color: var(--accent); border-color: var(--accent); }

  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 14px; box-shadow: 0 1px 3px rgba(88,28,135,.08); }

  .hpwrap { margin: 8px 0; }
  .hprow { display: flex; justify-content: space-between; font-size: 12px; font-weight: 700; color: var(--ink-dim); margin-bottom: 3px; }
  .hptrack { height: 16px; background: var(--hp-track); border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
  .hpfill { height: 100%; transition: width .35s ease; }
  .hpfill.monster { background: var(--danger); }
  .hpfill.hero { background: var(--success); }

  .monster-name { font-family: var(--display); font-size: 22px; color: var(--danger); margin: 0 0 4px; }
  .monster-flavor { font-size: 14px; color: var(--ink-dim); margin: 0 0 10px; }

  .word-staging {
    min-height: 52px; border: 2px dashed var(--border); border-radius: 10px;
    display: flex; align-items: center; gap: 6px; padding: 8px; flex-wrap: wrap;
    margin: 10px 0 6px; background: var(--panel2);
  }
  .word-staging .placeholder { color: var(--ink-dim); font-size: 13px; }
  .word-meta { display: flex; justify-content: space-between; font-size: 13px; font-weight: 700; color: var(--ink-dim); margin-bottom: 10px; min-height: 18px; }
  .word-meta .dmg { color: var(--accent); }
  .word-meta .bad { color: var(--danger); }
  .word-meta .rune { color: var(--sel); }

  .rack { display: flex; gap: 7px; justify-content: center; flex-wrap: wrap; margin: 6px 0 2px; }
  .tile {
    width: 48px; height: 52px; background: linear-gradient(145deg, var(--tile-a), var(--tile-b));
    color: var(--tile-ink); border: 1px solid var(--tile-border);
    border-radius: 9px; position: relative; cursor: pointer; user-select: none;
    display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 800;
    box-shadow: 0 2px 0 var(--accent-deep); transition: transform .1s; font-family: var(--display);
  }
  .tile:hover { transform: translateY(-2px); }
  .tile.in-word { outline: 3px solid var(--sel); outline-offset: 1px; }
  .tile.spent { opacity: .25; pointer-events: none; }
  .tile.static { cursor: default; }
  .tile.static:hover { transform: none; }
  .tile .val { position: absolute; bottom: 2px; right: 5px; font-size: 10px; font-weight: 700; font-family: var(--body); }

  .actions { display: flex; gap: 8px; margin-top: 14px; }
  button.act {
    flex: 1; padding: 12px; border-radius: 10px; border: 2px solid var(--accent);
    font-family: var(--body); font-weight: 800; font-size: 14px; cursor: pointer; background: var(--panel); color: var(--accent);
  }
  button.cast { background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #fff; border-color: transparent; box-shadow: 0 3px 0 var(--accent-deep); }
  button.act:disabled { opacity: .4; cursor: default; box-shadow: none; }

  /* fixed-size narrative region inside the monster card — text never changes the card height */
  .monster-text { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); font-size: 15px; color: var(--ink); line-height: 1.5; min-height: 66px; }
  .hit { color: var(--accent); font-weight: 700; }
  .ouch { color: var(--danger); font-weight: 700; }

  /* Loot */
  .loot-grid { display: flex; gap: 10px; margin-top: 10px; }
  .loot-card {
    flex: 1; text-align: center; padding: 16px 8px; border: 2px solid var(--border);
    border-radius: 12px; cursor: pointer; background: var(--panel2);
  }
  .loot-card:hover { border-color: var(--accent); }
  .loot-card .icon { font-size: 24px; }
  .loot-card .name { font-size: 14px; font-weight: 800; margin-top: 6px; }
  .loot-card .desc { font-size: 11px; color: var(--ink-dim); margin-top: 3px; }

  .center { text-align: center; }
  .class-badge { display: inline-block; padding: 4px 12px; border: 1px solid var(--accent); border-radius: 20px; color: var(--accent); font-size: 11px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; }
  .big-btn { display: block; max-width: 260px; margin: 14px auto 0; padding: 14px; border-radius: 12px; border: none; background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #fff; box-shadow: 0 3px 0 var(--accent-deep); font-family: var(--body); font-weight: 800; font-size: 15px; cursor: pointer; }
  .narr { font-size: 15px; color: var(--ink); line-height: 1.6; }
  .narr p { margin: 0 0 8px; }
  .end-title { font-family: var(--display); font-size: 26px; color: var(--accent); margin: 8px 0; }
  .codex-note { font-size: 11px; color: var(--ink-dim); text-align: center; margin-top: -6px; margin-bottom: 12px; }
</style>
</head>
<body class="">
<div class="wrap">
  <div class="topbar">
    <h1 class="title">Lexicon Quest <small>daily dungeon · word crawl</small></h1>
    <button class="themebtn" id="themebtn">◑ dark mode</button>
  </div>

  <div class="center" style="margin-bottom:12px;">
    <span class="class-badge">♪ Bard — doubled-letter words +50% dmg</span>
  </div>
  <div class="codex-note" id="codexNote">loading the codex…</div>

  <div class="runbar" id="runbar"></div>
  <div id="stage"></div>
</div>

<script>
// ---- letter values ----
const VAL = {A:1,B:3,C:3,D:2,E:1,F:4,G:2,H:4,I:1,J:8,K:5,L:1,M:3,N:1,O:1,P:3,Q:10,R:1,S:1,T:1,U:1,V:4,W:4,X:8,Y:4,Z:10,'?':0};

// ---- dictionary (real word check) ----
// 2-letter words are valid; single tiles are always castable as "runes" (no dict needed).
const TWO = "aa ab ad ae ag ah ai al am an ar as at aw ax ay ba be bi bo by da de do ed ef eh el em en er es et ew ex fa fe gi go ha he hi hm ho id if in is it jo ka ki la li lo ma me mi mm mo mu my na ne no nu od oe of oh oi om on op or os ow ox oy pa pe pi po qi re sh si so ta te ti to uh um un up us ut we wo xi xu ya ye yo za".split(' ');
let DICT = new Set(TWO);
let dictReady = false;
async function loadDict(){
  try {
    const res = await fetch('https://cdn.jsdelivr.net/gh/dolph/dictionary@master/popular.txt');
    const txt = await res.text();
    txt.split(/\s+/).forEach(w => { if(w) DICT.add(w.toLowerCase()); });
    TWO.forEach(w => DICT.add(w));
    document.getElementById('codexNote').textContent = 'codex loaded · ' + DICT.size.toLocaleString() + ' words';
  } catch(e) {
    "the and bard bards bread beard bear bare base best beat rate read rest seat star tea tear eat ear sea set rat tar tab bat bad sad dare date dart drab brat tread treads sabre".split(' ').forEach(w => DICT.add(w));
    document.getElementById('codexNote').textContent = 'codex offline · using fallback list';
  }
  dictReady = true;
  if(state) render();
}

function isValidWord(letters){
  const w = letters.join('').toLowerCase();
  if(!w.includes('?')) return DICT.has(w);
  // resolve a single wildcard by trying every letter
  const i = w.indexOf('?');
  for(let c=97;c<=122;c++){
    const cand = w.slice(0,i)+String.fromCharCode(c)+w.slice(i+1);
    if(!cand.includes('?') && DICT.has(cand)) return true;
  }
  return false;
}

// ---- monsters (HP curve 15/25/35/50/80) ----
// encounter/kill text are PLACEHOLDER — Raven is drafting the real copy.
const ROOMS = [
  {name:"Gnashling",   hp:15, dmg:8,  flavor:"the size of a teapot, twice as loud.",
   enc:"A Gnashling the size of a teapot screams at you and means it.",
   kill:"Your word swats it across the room. It is still yelling."},
  {name:"Mire Crawler",hp:25, dmg:10, flavor:"silent, and wrong about it.",
   enc:"The Mire Crawler comes up through the standing water without a sound.",
   kill:"Your word opens it. It sinks back down the way it came."},
  {name:"Bone Choir",  hp:35, dmg:12, flavor:"one note, and it knows you.",
   enc:"Three skulls hold one note, and the note knows your name.",
   kill:"Your word breaks the chord. The silence afterward is worse."},
  {name:"Rust Ogre",   hp:50, dmg:15, flavor:"in no hurry at all.",
   enc:"The Rust Ogre takes up the whole room and is in no hurry about it.",
   kill:"Your word goes through the armour. It takes the rest of the day to fall."},
  {name:"The Lexivore",hp:80, dmg:20, flavor:"every mouth, open.",
   enc:"The Lexivore opens every mouth at once and waits for you to feed it.",
   kill:"You spell the word it cannot eat. It starves in seconds. Run complete."},
];

// Narrative copy by Raven (v2 — varied structure, fixed-card length budget).
const INTRO = [
  "The dark down here is older than the floor it sits on.",
  "You brought letters to a knife fight. Go."
];
const RUNE_FLAVOR = [
  "Out of words, you flick a single tile into the dark and hope.",
  "One loose letter, thrown like a stone. It'll have to do.",
  "No word left in you. You spend a lone rune and pray it lands."
];
let runeIdx = 0;
const TRANSITION = "The floor slopes down. The dark gets friendlier with the dead.";

const START_RACK = ['B','A','R','D','S','E','T'];

let state;
function newGame(){
  state = {
    phase: 'intro',
    room: 0,
    heroHP: 100, heroMax: 100,
    monsterHP: ROOMS[0].hp,
    rack: START_RACK.map((l,i)=>({id:i, letter:l, spent:false})),
    nextId: START_RACK.length,
    word: [],
    log: "",
  };
  render();
}

// Rack composition rule: every rack is guaranteed >=2 vowels AND >=2 consonants,
// so it can essentially always form a word and never dead-ends.
const V_POOL = "AAAAEEEEIIIOOUU".split('');
const C_POOL = "NNNRRRTTTLLLSSSDDGGBBCCMMPPFHVWYK".split('');
function isVowel(l){ return l==='A'||l==='E'||l==='I'||l==='O'||l==='U'; }
function pick(p){ return p[Math.floor(Math.random()*p.length)]; }
function wordTiles(){ return state.word.map(id => state.rack.find(t=>t.id===id)); }
// fill any spent slots, honouring the >=2/>=2 floor across the whole rack
function refillSpent(){
  const kept = state.rack.filter(t=>!t.spent);
  let v = kept.filter(t=>isVowel(t.letter)).length;
  let c = kept.filter(t=>!isVowel(t.letter) && t.letter!=='?').length;
  state.rack = state.rack.map(t=>{
    if(!t.spent) return t;
    let letter;
    if(v<2){ letter=pick(V_POOL); v++; }
    else if(c<2){ letter=pick(C_POOL); c++; }
    else { letter=pick(Math.random()<0.42?V_POOL:C_POOL); isVowel(letter)?v++:c++; }
    return {id:state.nextId++, letter, spent:false};
  });
}
// a whole fresh 7-tile rack with the same floor (used by the redraw loot)
function freshRack(){
  const tiles=[]; let v=0,c=0;
  for(let i=0;i<7;i++){
    let letter;
    if(v<2){ letter=pick(V_POOL); v++; }
    else if(c<2){ letter=pick(C_POOL); c++; }
    else { letter=pick(Math.random()<0.42?V_POOL:C_POOL); isVowel(letter)?v++:c++; }
    tiles.push({id:state.nextId++, letter, spent:false});
  }
  return tiles;
}
function hasDoubledLetter(ls){ for(let i=1;i<ls.length;i++) if(ls[i]===ls[i-1]) return true; return false; }

function evalSelection(){
  const tiles = wordTiles();
  const letters = tiles.map(t=>t.letter);
  const len = letters.length;
  if(len===0) return {len:0, kind:'none', valid:false, dmg:0};
  if(len===1) return {len:1, kind:'rune', valid:true, dmg:VAL[letters[0]], letters};
  const base = tiles.reduce((s,t)=>s+VAL[t.letter],0);
  const valid = isValidWord(letters);
  const doubled = hasDoubledLetter(letters);
  const dmg = valid ? Math.round(base*(doubled?1.5:1)) : 0;
  return {len, kind:'word', valid, dmg, base, doubled, letters};
}

function toggleTile(id){
  if(state.phase!=='fight') return;
  const t = state.rack.find(x=>x.id===id);
  if(t.spent) return;
  const idx = state.word.indexOf(id);
  if(idx>=0) state.word.splice(idx,1); else state.word.push(id);
  render();
}
function clearWord(){ state.word=[]; render(); }

function cast(){
  const ev = evalSelection();
  if(!ev.valid || ev.len<1) return;
  state.monsterHP = Math.max(0, state.monsterHP - ev.dmg);
  wordTiles().forEach(t=>{ t.spent=true; });
  refillSpent();
  state.word = [];
  const room = ROOMS[state.room];
  let msg;
  if(ev.kind==='rune'){
    msg = `<span class="hit">${RUNE_FLAVOR[runeIdx % RUNE_FLAVOR.length]} (${ev.dmg} dmg)</span>`;
    runeIdx++;
  } else {
    msg = `<span class="hit">You strike for ${ev.dmg}${ev.doubled?' (♪ doubled-letter bonus!)':''}.</span>`;
  }
  if(state.monsterHP<=0){
    state.phase = (state.room === ROOMS.length-1) ? 'win' : 'victory';
    state.log = msg;
  } else {
    state.heroHP = Math.max(0, state.heroHP - room.dmg);
    msg += ` <span class="ouch">The ${room.name} hits back for ${room.dmg}.</span>`;
    state.log = msg;
    if(state.heroHP<=0) state.phase='dead';
  }
  render();
}

function enterDungeon(){ state.phase='fight'; state.log = ROOMS[0].enc; render(); }
function pressOnward(){ state.phase='loot'; render(); }

function takeLoot(kind){
  if(kind==='hp') state.heroHP = Math.min(state.heroMax, state.heroHP+20);
  if(kind==='wild') state.rack.push({id:state.nextId++, letter:'?', spent:false});
  if(kind==='redraw') state.rack = freshRack();
  state.room++;
  state.monsterHP = ROOMS[state.room].hp;
  state.word=[];
  state.phase='fight';
  state.log = ROOMS[state.room].enc;
  render();
}

// ---- render ----
function render(){
  document.getElementById('runbar').innerHTML = ROOMS.map((r,i)=>{
    const cls = i<state.room ? 'done' : (i===state.room?'current':'');
    const mark = i<state.room ? '✓' : (i+1);
    return `<div class="room-pip ${cls}">${mark}</div>`;
  }).join('');

  const stage = document.getElementById('stage');

  if(state.phase==='intro'){
    stage.innerHTML = `
      <div class="panel">
        <div class="narr center">${INTRO.map(l=>`<p>${l}</p>`).join('')}</div>
        <button class="big-btn" onclick="enterDungeon()">Enter the dungeon ▸</button>
      </div>`;
    return;
  }

  if(state.phase==='dead' || state.phase==='win'){
    const cleared = state.phase==='win' ? ROOMS.length : state.room;
    stage.innerHTML = `
      <div class="panel center">
        <div class="end-title">${state.phase==='win'?'Dungeon cleared.':'You fell in Room '+(state.room+1)+'.'}</div>
        <p class="narr">Rooms cleared: <b>${cleared}/5</b> · HP remaining: <b>${state.heroHP}</b></p>
        <p style="font-size:12px;color:var(--ink-dim)">Today's seed is spent. One attempt per day. The leaderboard ranks by HP remaining.</p>
        <button class="big-btn" onclick="newGame()">↺ replay mockup</button>
      </div>`;
    return;
  }

  if(state.phase==='victory'){
    const room = ROOMS[state.room];
    stage.innerHTML = `
      <div class="panel center">
        <div class="end-title" style="color:var(--success)">${room.name} down.</div>
        <p class="narr">${room.kill}</p>
        <p class="narr" style="color:var(--ink-dim)">${TRANSITION}</p>
        <button class="big-btn" onclick="pressOnward()">Go Deeper ▸</button>
      </div>`;
    return;
  }

  if(state.phase==='loot'){
    const hHpPct = (state.heroHP / state.heroMax)*100;
    const lootRack = state.rack.map(t=>`<div class="tile static">${t.letter==='?'?'★':t.letter}<span class="val">${VAL[t.letter]}</span></div>`).join('');
    stage.innerHTML = `
      <div class="panel">
        <p style="font-weight:800;color:var(--success);margin-top:0;text-align:center">You search the room. Choose your spoils:</p>
        <div class="hpwrap">
          <div class="hprow"><span>You — Bard</span><span>${state.heroHP} / ${state.heroMax}</span></div>
          <div class="hptrack"><div class="hpfill hero" style="width:${hHpPct}%"></div></div>
        </div>
        <div class="hprow" style="margin:12px 0 4px"><span>Your current rack</span></div>
        <div class="rack">${lootRack}</div>
        <div class="loot-grid">
          <div class="loot-card" onclick="takeLoot('wild')"><div class="icon">◆</div><div class="name">Wildcard tile</div><div class="desc">a ★ that plays as any letter</div></div>
          <div class="loot-card" onclick="takeLoot('hp')"><div class="icon">✚</div><div class="name">+20 HP</div><div class="desc">patch your wounds</div></div>
          <div class="loot-card" onclick="takeLoot('redraw')"><div class="icon">↻</div><div class="name">Redraw rack</div><div class="desc">swap all 7 for fresh tiles</div></div>
        </div>
      </div>`;
    return;
  }

  // ---- fight ----
  const room = ROOMS[state.room];
  const ev = evalSelection();
  const mHpPct = (state.monsterHP / room.hp)*100;
  const hHpPct = (state.heroHP / state.heroMax)*100;

  const wordStage = state.word.length
    ? wordTiles().map(t=>`<span class="tile in-word" style="width:38px;height:42px;font-size:19px" onclick="toggleTile(${t.id})">${t.letter==='?'?'★':t.letter}<span class="val">${VAL[t.letter]}</span></span>`).join('')
    : `<span class="placeholder">tap tiles to spell a word — or tap one to hurl it as a rune</span>`;

  const rackHtml = state.rack.map(t=>{
    const inWord = state.word.includes(t.id);
    return `<div class="tile ${inWord?'in-word':''}" onclick="toggleTile(${t.id})">${t.letter==='?'?'★':t.letter}<span class="val">${VAL[t.letter]}</span></div>`;
  }).join('');

  let meta = '';
  if(ev.kind==='rune') meta = `<span class="rune">rune · ${ev.dmg} dmg</span>`;
  else if(ev.kind==='word' && ev.valid) meta = `<span class="dmg">${ev.doubled?`♪ ${ev.base} ×1.5 = ${ev.dmg} dmg`:`${ev.dmg} dmg`}</span>`;
  else if(ev.kind==='word' && !ev.valid) meta = `<span class="bad">not in the codex</span>`;

  const canCast = (ev.kind==='rune') || (ev.kind==='word' && ev.valid && dictReady);
  const castLabel = ev.kind==='rune' ? '⚡ hurl rune' : '⚔ cast word';

  stage.innerHTML = `
    <div class="panel monster-card">
      <p class="monster-name">${room.name}</p>
      <div class="hpwrap">
        <div class="hprow"><span>Monster</span><span>${state.monsterHP} / ${room.hp}</span></div>
        <div class="hptrack"><div class="hpfill monster" style="width:${mHpPct}%"></div></div>
      </div>
      <div class="monster-text">${state.log || room.enc}</div>
    </div>

    <div class="panel">
      <div class="word-staging">${wordStage}</div>
      <div class="word-meta">
        <span>${ev.len? (ev.kind==='rune'?'1 rune':`${ev.len} letters`) : ''}</span>
        <span>${meta}</span>
      </div>
      <div class="rack">${rackHtml}</div>
      <div class="actions">
        <button class="act" onclick="clearWord()" ${state.word.length?'':'disabled'}>clear</button>
        <button class="act cast" onclick="cast()" ${canCast?'':'disabled'}>${castLabel}</button>
      </div>
    </div>

    <div class="panel">
      <div class="hpwrap" style="margin:0">
        <div class="hprow"><span>You — Bard</span><span>${state.heroHP} / ${state.heroMax}</span></div>
        <div class="hptrack"><div class="hpfill hero" style="width:${hHpPct}%"></div></div>
      </div>
    </div>`;
}

document.getElementById('themebtn').addEventListener('click', ()=>{
  const dark = document.body.classList.toggle('dark');
  document.getElementById('themebtn').textContent = dark ? '◐ light mode' : '◑ dark mode';
});

loadDict();
newGame();
</script>
</body>
</html>
